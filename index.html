<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DistribOS v6 - Ready Firebase App</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px}
.container{max-width:500px;margin:auto}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
input{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc}
button{padding:10px;border:none;background:#2563eb;color:#fff;border-radius:6px;width:100%;cursor:pointer}
h3{margin-top:0}
</style>
</head>
<body>

<div class="container">
<h2>DistribOS - Live Orders</h2>

<div class="card">
<h3>Create Order</h3>
<input id="shop" placeholder="Shop Name">
<input id="amount" type="number" placeholder="Amount">
<button onclick="createOrder()">Create Order</button>
</div>

<div id="orders"></div>
</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBfSR7OItS7aBvAfRDEb0wl1XJeS-nhVes",
  authDomain: "distribos-thane.firebaseapp.com",
  projectId: "distribos-thane",
  storageBucket: "distribos-thane.firebasestorage.app",
  messagingSenderId: "273501452522",
  appId: "1:273501452522:web:6b5fe7edb46f92a8723f93"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// CREATE ORDER
function createOrder(){
  const shop=document.getElementById('shop').value;
  const amount=document.getElementById('amount').value;

  if(!shop || !amount){
    alert('Please enter shop and amount');
    return;
  }

  const id='ORD'+Date.now();

  db.collection('orders').doc(id).set({
    shop:shop,
    amount:Number(amount),
    status:'pending',
    timestamp:new Date().toISOString()
  });

  document.getElementById('shop').value='';
  document.getElementById('amount').value='';
}

// REALTIME LISTENER
const ordersDiv=document.getElementById('orders');

db.collection('orders').onSnapshot(snapshot=>{
  let html='';

  snapshot.forEach(doc=>{
    const o=doc.data();

    html+=`<div class="card">
      <b>${o.shop}</b><br>
      ₹ ${o.amount}<br>
      Status: ${o.status}
    </div>`;
  });

  ordersDiv.innerHTML=html;
});
</script>

</body>
</html>
